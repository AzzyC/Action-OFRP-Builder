name: Recovery Build

on:
  workflow_dispatch:
    inputs:
      device_tree_url:
        description: "Select device tree repository"
        required: true
        type: choice
        default: https://github.com/AzzyC/ofox_device_xiaomi_peridot
        options:
          - https://github.com/AzzyC/ofox_device_xiaomi_peridot
          - https://gitlab.com/OrangeFox/device/peridot_new

      device_tree_branch:
        description: "Select device tree branch"
        required: true
        default: fox_16.0
        type: choice
        options:
          - fox_16.0

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    env:
      SYNC_URL: https://github.com/OrangeFox16/sync.git
      MANIFEST_BRANCH: "16.0"
      DEVICE_TREE_URL: ${{ inputs.device_tree_url }}
      DEVICE_TREE_BRANCH: ${{ inputs.device_tree_branch }}
      DEVICE_PATH: device/xiaomi/peridot
      DEVICE_NAME: peridot
      MAKEFILE_NAME: twrp_peridot
      BUILD_TARGET: recovery

    steps:

    # Cleanup The Actions Workspace Using Custom Composite Run Actions
    - name: Cleanup
      uses: rokibhasansagar/slimhub_actions@main

    # Setup SSH for GitLab
    - name: Setup SSH Keys
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Add GitLab to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan gitlab.com >> ~/.ssh/known_hosts

    - name: Create Telegram sender script
      run: |
        cat <<'EOF' > /tmp/send_msg.sh
        #!/bin/bash
        MSG="$(printf "$1")"
        curl -s --fail \
          -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="$MSG" \
          -d parse_mode="Markdown" \
          -d disable_web_page_preview=true \
        > /dev/null 2>&1 || true
        EOF
        chmod +x /tmp/send_msg.sh

    - name: Initialize workspace
      run: |
        /tmp/send_msg.sh "🚀 *Starting OrangeFox build* for \`${{ env.DEVICE_NAME }}\` (\`${{ env.MANIFEST_BRANCH }}\`)\n🔗 [View Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
        mkdir workspace
        cd workspace
        echo "workspace-folder=$(pwd)" >> $GITHUB_OUTPUT
      id: pwd

    - name: Prepare the build environment
      run: |
        /tmp/send_msg.sh "🧩 Preparing build environment..."
        DEBIAN_FRONTEND=noninteractive sudo apt install -yq \
            linux-modules-extra-$(uname -r) \
            git python3 tar aria2
        curl -L -O "https://gitlab.com/OrangeFox/misc/scripts/-/raw/master/setup/android_build_env.sh"
        sudo bash android_build_env.sh
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Install OpenJDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'

    - name: Sync OrangeFox sources and minimal manifest
      run: |
        /tmp/send_msg.sh "🌐 Syncing OrangeFox sources..."
        cd ${{ steps.pwd.outputs.workspace-folder }}
        git clone --depth=1 ${{ env.SYNC_URL }}
        cd sync
        ./orangefox_sync.sh --branch ${{ env.MANIFEST_BRANCH }} --path ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ env.MANIFEST_BRANCH }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Replace bootable/recovery with Testing/Recovery
      run: |
        /tmp/send_msg.sh "🔁 Replacing bootable/recovery..."

        cd ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ env.MANIFEST_BRANCH }}

        rm -rf bootable/recovery

        git clone --depth=1 -b fox_16.0-R12-wlan-test \
          git@gitlab.com:OrangeFox/Testing/Recovery.git \
          bootable/recovery

        rm -rf vendor/recovery

        git clone --depth=1 -b fox_16.0-R12 \
          git@gitlab.com:OrangeFox/vendor/recovery.git \
          vendor/recovery

      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Clone device tree
      run: |
        /tmp/send_msg.sh "🌲 Cloning device tree for \`${{ env.DEVICE_NAME }}\`..."
        cd ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ env.MANIFEST_BRANCH }}
        git clone --depth=1 ${{ env.DEVICE_TREE_URL }} -b ${{ env.DEVICE_TREE_BRANCH }} ./${{ env.DEVICE_PATH }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Get latest device tree commit
      id: devtree_commit
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ env.MANIFEST_BRANCH }}/${{ env.DEVICE_PATH }}
        LATEST_COMMIT=$(git rev-parse --short=7 HEAD)
        echo "LATEST_COMMIT=$LATEST_COMMIT" >> $GITHUB_OUTPUT
        echo "Latest device tree commit: $LATEST_COMMIT"
        /tmp/send_msg.sh "🌲 Device tree: [${LATEST_COMMIT}](${{ env.DEVICE_TREE_URL }}/tree/$LATEST_COMMIT)"
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 30

    - name: Show system resources
      run: |
        /tmp/send_msg.sh "📊 Checking runner resources..."
        echo "CPU cores:"
        nproc
        echo
        echo "Memory:"
        free -h
        echo
        echo "Disk:"
        df -h
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Building recovery
      run: |
        /tmp/send_msg.sh "⚙️ Starting build for \`${{ env.DEVICE_NAME }}\`..."
        cd ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ env.MANIFEST_BRANCH }}
        set +e
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        set -e
        lunch ${{ env.MAKEFILE_NAME }}-bp2a-eng
        mka adbd ${{ env.BUILD_TARGET }}image -j$(nproc --all)
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}
      continue-on-error: true

    - name: Notify Build Failure
      if: failure()
      run: |
        /tmp/send_msg.sh "❌ Build failed for \`${{ env.DEVICE_NAME }}\` (\`${{ env.MANIFEST_BRANCH }}\`)\n🔗 [View Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
        exit 1

    - name: Show system resources post-build
      run: |
        /tmp/send_msg.sh "📊 Checking runner resources..."
        echo "CPU cores:"
        nproc
        echo
        echo "Memory:"
        free -h
        echo
        echo "Disk:"
        df -h
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Check the output directory before uploading
      run: |
        /tmp/send_msg.sh "🧾 Checking output directory..."
        ls ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ env.MANIFEST_BRANCH }}/out/target/product/${{ env.DEVICE_NAME }}/

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ env.MANIFEST_BRANCH }}/out/target/product/${{ env.DEVICE_NAME }}/recovery.img
          ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ env.MANIFEST_BRANCH }}/out/target/product/${{ env.DEVICE_NAME }}/OrangeFox-R*.zip
        name: ${{ env.DEVICE_NAME }}-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          Manifest: ${{ env.MANIFEST_BRANCH }}
          Device: ${{ env.DEVICE_NAME }}
          Target: ${{ env.BUILD_TARGET }}
          Device tree commit: [${{ steps.devtree_commit.outputs.LATEST_COMMIT }}](${{ env.DEVICE_TREE_URL }}/tree/${{ steps.devtree_commit.outputs.LATEST_COMMIT }})
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Notify Release
      if: success()
      run: |
        RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${{ github.run_id }}"
        DEVICE_TREE_BROWSE_URL="${{ env.DEVICE_TREE_URL }}/tree/${{ steps.devtree_commit.outputs.LATEST_COMMIT }}"
        /tmp/send_msg.sh "📦 *Build complete!*\n🔗 [Download]($RELEASE_URL)\n🌲 Device tree commit: [${{ steps.devtree_commit.outputs.LATEST_COMMIT }}]($DEVICE_TREE_BROWSE_URL)"
